<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Test Chamber 1</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      color: white;
      background-image: url("hall2.jpg"); /* Background image */
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat; /* nono repeat the image */
      overflow: hidden;
    }

       .title { /* TITLEEEEE */
      position: fixed;
      top: 18px;
      left: 24px;
      z-index: 50;
      font-size: 32px;
      font-weight: bold;
      text-shadow: 0 0 8px black, 0 0 14px black;
    }
    
    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
    }

    .grid-container {
      display: grid;
      grid-template-columns: repeat(3, 190px);
      grid-template-rows: repeat(3, 190px);
      gap: 0;
      background: black;
      border: 6px solid black;
      box-shadow: 0 0 18px rgba(0, 0, 0, 0.8);
    }

    .grid-slot {
      width: 190px;
      height: 190px;
      border: 3px solid black;
      position: relative;
      overflow: hidden;
      background: black;
    }

    .photo-wrapper {
      width: 100%;
      height: 100%;
      cursor: grab;
      position: absolute;
      top: 0;
      left: 0;
    }

    .photo-wrapper:active { cursor: grabbing; }

    .photo-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      pointer-events: none;
      transition: transform 0.25s ease;
    }

    .controls {
      position: absolute;
      bottom: 5px;
      left: 5px;
      right: 5px;
      display: flex;
      justify-content: space-between;
      opacity: 0;
      transition: opacity 0.2s ease;
      z-index: 10;
    }

    .grid-slot:hover .controls { opacity: 1; }

       .rotate-btn {
      background: rgba(0, 0, 0, 0.75);
      color: white;
      border: 1px solid white;
      border-radius: 3px;
      padding: 4px 8px;
      font-size: 16px;
      cursor: pointer;
    }

    .answer-box {
      text-align: center;
      text-shadow: 0 2px 4px black;
    }

    .answer-box label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
      font-size: 18px;
    }

    .answer-box input {
      padding: 6px;
      font-size: 15px;
      width: 175px;
    }

    .answer-box button {
      padding: 6px 10px;
      font-size: 15px;
      cursor: pointer;
    }

            .glados-button {
      position: fixed;
      top: 35px;
      left: 40px;
      width: 220px;
      height: auto;
      cursor: pointer;
      z-index: 20;
    }
    
    .top-right-button { /* bucket button */
      position: fixed;
      top: 35px;
      right: 40px;
      width: 100px;
      height: auto;
      cursor: pointer;
      z-index: 20;
    }

        .bottom-right-media { /* bunni */
      position: fixed;
      bottom: 35px;
      right: 35px;
      width: 120px;
      height: 158px;
      object-fit: cover;
      cursor: pointer;
      z-index: 20;
      background: black;
      padding: 5px;
    }

    .hidden { display: none; }

    .gman-image {  /* gman! not green man */
      position: fixed;
      top: 50%;
      left: 20px;
      transform: translateY(-50%);
      width: 110px;
      height: auto;
      opacity: 0;
      pointer-events: none;
      transition: opacity 1s ease-in-out; /* fade speed */
      z-index: 30;
    }

    .gman-image.show { opacity: 1; }

    #loadingScreen {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: black;
    z-index: 9999;
    cursor: pointer;
}

#loadingScreen img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}
    
  </style>
</head>

<body>
<div id="loadingScreen" onclick="closeLoadingScreen()">
    <img src="loading.jpg" alt="Loading Screen">
</div>
  
  <div class="title">Test Chamber 1</div>
  
  <audio id="wrongAudio" src="nottoworry.mp3"></audio>
  <audio id="bucketAudio" src="thisisabucket.mp3"></audio>
  <audio id="peacefulAudio" src="peaceful.mp3" loop></audio>

  <img id="gmanImage" src="gman.jpg" alt="G-Man" class="gman-image" />
  <img id="bucketButton" src="bucket.jpg" alt="Bucket Button" class="top-right-button" />

  <!-- GLaDOS  -->
    <img id="gladosButton" src="glados.png" alt="GLaDOS Button" class="glados-button">
    <audio id="gladosAudio" src="glados.mp3"></audio>
  
<img id="bunnyImage" src="bunny.jpg" alt="Bunny Button" class="bottom-right-media" />
  <video id="bunnyVideo" class="bottom-right-media hidden" src="bunnybleh.mp4" playsinline></video>

  <div class="page">
    <div class="grid-container">  <!-- da grid pix -->
      <div class="grid-slot"><div class="photo-wrapper" draggable="true" id="photo1" data-rotation="0"><img src="dog1.jpg" alt="Photo 1"><div class="controls"><button class="rotate-btn" onclick="rotatePhoto(this, -90)">↺</button><button class="rotate-btn" onclick="rotatePhoto(this, 90)">↻</button></div></div></div>
      <div class="grid-slot"><div class="photo-wrapper" draggable="true" id="photo2" data-rotation="0"><img src="dog2.jpg" alt="Photo 2"><div class="controls"><button class="rotate-btn" onclick="rotatePhoto(this, -90)">↺</button><button class="rotate-btn" onclick="rotatePhoto(this, 90)">↻</button></div></div></div>
      <div class="grid-slot"><div class="photo-wrapper" draggable="true" id="photo3" data-rotation="0"><img src="dog3.jpg" alt="Photo 3"><div class="controls"><button class="rotate-btn" onclick="rotatePhoto(this, -90)">↺</button><button class="rotate-btn" onclick="rotatePhoto(this, 90)">↻</button></div></div></div>
      <div class="grid-slot"><div class="photo-wrapper" draggable="true" id="photo4" data-rotation="0"><img src="dog4.jpg" alt="Photo 4"><div class="controls"><button class="rotate-btn" onclick="rotatePhoto(this, -90)">↺</button><button class="rotate-btn" onclick="rotatePhoto(this, 90)">↻</button></div></div></div>
      <div class="grid-slot"><div class="photo-wrapper" draggable="true" id="photo5" data-rotation="0"><img src="dog5.jpg" alt="Photo 5"><div class="controls"><button class="rotate-btn" onclick="rotatePhoto(this, -90)">↺</button><button class="rotate-btn" onclick="rotatePhoto(this, 90)">↻</button></div></div></div>
      <div class="grid-slot"><div class="photo-wrapper" draggable="true" id="photo6" data-rotation="0"><img src="dog6.jpg" alt="Photo 6"><div class="controls"><button class="rotate-btn" onclick="rotatePhoto(this, -90)">↺</button><button class="rotate-btn" onclick="rotatePhoto(this, 90)">↻</button></div></div></div>
      <div class="grid-slot"><div class="photo-wrapper" draggable="true" id="photo7" data-rotation="0"><img src="dog7.jpg" alt="Photo 7"><div class="controls"><button class="rotate-btn" onclick="rotatePhoto(this, -90)">↺</button><button class="rotate-btn" onclick="rotatePhoto(this, 90)">↻</button></div></div></div>
      <div class="grid-slot"><div class="photo-wrapper" draggable="true" id="photo8" data-rotation="0"><img src="dog8.jpg" alt="Photo 8"><div class="controls"><button class="rotate-btn" onclick="rotatePhoto(this, -90)">↺</button><button class="rotate-btn" onclick="rotatePhoto(this, 90)">↻</button></div></div></div>
      <div class="grid-slot"><div class="photo-wrapper" draggable="true" id="photo9" data-rotation="0"><img src="dog9.jpg" alt="Photo 9"><div class="controls"><button class="rotate-btn" onclick="rotatePhoto(this, -90)">↺</button><button class="rotate-btn" onclick="rotatePhoto(this, 90)">↻</button></div></div></div>
    </div>

    <form id="codeForm" class="answer-box">
      <label for="codeInput">"What's the hidden number?"</label>   <!-- whats in the boxxxx-->
      <input type="text" id="codeInput" placeholder="???" autocomplete="off" required />
      <button type="submit">Submit</button>
    </form>
  </div>

  <script>
 let draggedElement = null;
    let bucketHasHat = false;

    const peacefulAudio = document.getElementById("peacefulAudio");
       // GLaDOS button
  const gladosButton = document.getElementById("gladosButton");
  const gladosAudio = document.getElementById("gladosAudio");

  gladosButton.addEventListener("click", () => {
    gladosAudio.currentTime = 0;
    gladosAudio.play();
  });

    function startPeacefulAudio() {
      peacefulAudio.volume = 0.35;
      peacefulAudio.play().catch(() => {
        // Browsers often block background audio until the first click/key press.
      });
    }

    window.addEventListener("load", startPeacefulAudio);

    ["click", "keydown", "dragstart"].forEach(eventName => {
      document.addEventListener(eventName, startPeacefulAudio, { once: true });
    });

    function rotatePhoto(button, degrees) {
      const wrapper = button.closest(".photo-wrapper");
      const img = wrapper.querySelector("img");
      let currentRotation = parseInt(wrapper.dataset.rotation) || 0;
      currentRotation += degrees;
      wrapper.dataset.rotation = currentRotation;
      img.style.transform = `rotate(${currentRotation}deg)`;
    }

    document.querySelectorAll(".photo-wrapper").forEach(wrapper => {
      wrapper.addEventListener("dragstart", event => {
        draggedElement = wrapper;
        event.dataTransfer.setData("text/plain", wrapper.id);
      });
    });

    document.querySelectorAll(".grid-slot").forEach(slot => {
      slot.addEventListener("dragover", event => event.preventDefault());

      slot.addEventListener("drop", event => {
        event.preventDefault();
        const currentOccupant = slot.querySelector(".photo-wrapper");
        const originalSlot = draggedElement.parentElement;

        if (currentOccupant && currentOccupant !== draggedElement) {
          originalSlot.appendChild(currentOccupant);
        }

        slot.appendChild(draggedElement);
      });
    });

    document.getElementById("codeForm").addEventListener("submit", event => {
      event.preventDefault();

      const userInput = document.getElementById("codeInput").value.trim();
      const wrongAudio = document.getElementById("wrongAudio");
      const gmanImage = document.getElementById("gmanImage");
      
      if (userInput === "197") {
        window.location.href = "https://ohlooklizard.github.io/Testchamber2/";
      } else {
        wrongAudio.currentTime = 0;
        wrongAudio.play();

        gmanImage.classList.add("show");

        setTimeout(() => {
          gmanImage.classList.remove("show");
        }, 3000);

        document.getElementById("codeInput").value = "";
      }
    });

    document.getElementById("bucketButton").addEventListener("click", () => {
      const bucketButton = document.getElementById("bucketButton");
      const bucketAudio = document.getElementById("bucketAudio");

      bucketHasHat = !bucketHasHat;
      bucketButton.src = bucketHasHat ? "buckethat.jpg" : "bucket.jpg";

      bucketAudio.currentTime = 0;
      bucketAudio.play();
    });

    document.getElementById("bunnyImage").addEventListener("click", () => {
      const bunnyImage = document.getElementById("bunnyImage");
      const bunnyVideo = document.getElementById("bunnyVideo");

      bunnyImage.classList.add("hidden");
      bunnyVideo.classList.remove("hidden");

      bunnyVideo.currentTime = 0;
      bunnyVideo.play();

      bunnyVideo.onended = () => {
        bunnyVideo.classList.add("hidden");
        bunnyImage.classList.remove("hidden");
      };
    });

    document.getElementById("bunnyVideo").addEventListener("click", () => {
      const bunnyImage = document.getElementById("bunnyImage");
      const bunnyVideo = document.getElementById("bunnyVideo");

      bunnyVideo.pause();
      bunnyVideo.classList.add("hidden");
      bunnyImage.classList.remove("hidden");
    });

    function closeLoadingScreen() {
    document.getElementById("loadingScreen").style.display = "none";
}
  </script>
</body>
</html>
